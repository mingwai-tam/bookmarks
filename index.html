<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Public Bookmarks</title>
  <meta name="description" content="A public bookmark page hosted on GitHub Pages." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card">
    <header class="header">
      <h1>Public Bookmarks</h1>
      <p>Personal link library — searchable, categorized.</p>
    </header>

    <section class="controls" aria-label="Bookmark controls">
      <div id="tabs" class="tabs" role="tablist" aria-label="Bookmark categories"></div>
      <label class="theme-wrap" for="theme-select">
        <span>Theme</span>
        <select id="theme-select" aria-label="Theme mode">
          <option value="auto">Auto</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </label>
      <label class="search-wrap" for="bookmark-search">
        <span>Search</span>
        <input id="bookmark-search" type="search" placeholder="Search title, URL, or tags" autocomplete="off" />
      </label>
      <p id="result-count" class="result-count" aria-live="polite"></p>
    </section>

    <ul id="bookmark-list" class="list" aria-label="Bookmarks"></ul>
    <p id="empty-state" class="empty" hidden>No bookmarks match this search.</p>

    <footer class="footer">Edit <code>bookmarks.js</code> to add or organize links.</footer>
  </main>

  <script src="bookmarks.js"></script>
  <script src="script.js"></script>
</body>
</html>
